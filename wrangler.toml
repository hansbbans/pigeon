name = "pigeon"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# --- D1 Database ---
# After creating the database with `wrangler d1 create pigeon-db`,
# paste the database_id below.
[[d1_databases]]
binding = "DB"
database_name = "pigeon-db"
database_id = "65ec27b1-54fa-4c5f-ba3c-577ea5e334ad"

# --- Environment Variables ---
[vars]
BASE_URL = "https://hanscho.com"
ITEMS_PER_FEED = "50"
TRUSTED_FORWARDER = "hans.cho@gmail.com"
# API_PASSWORD set via `wrangler secret put API_PASSWORD`

# --- Cron Triggers ---
# Hourly RSS feed refresh
[triggers]
crons = ["0 * * * *"]
